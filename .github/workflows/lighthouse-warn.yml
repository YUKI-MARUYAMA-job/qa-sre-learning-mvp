name: lighthouse-warn

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lighthouse-warn-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse warn-only check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Show runtime versions
        run: |
          bun --version
          bun --revision
          node --version
          google-chrome --version || true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        run: bun run site:build

      - name: Run Lighthouse CI in warn mode
        run: bun run lighthouse:check

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports
          path: .lighthouseci/reports
          if-no-files-found: warn
